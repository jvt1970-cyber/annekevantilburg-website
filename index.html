<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anneke van Tilburg</title>
  <!-- Redirect to preferred language version -->
  <script>
    // Detect browser language and redirect accordingly
    // Default to English; redirect to Dutch if browser language is Dutch
    var lang = navigator.language || navigator.userLanguage || 'en';
    if (lang.startsWith('nl')) {
      window.location.replace('./nl/index.html');
    } else {
      window.location.replace('./en/index.html');
    }
  </script>
  <meta http-equiv="refresh" content="0; url=./en/index.html">
  <link rel="alternate" hreflang="en" href="./en/index.html">
  <link rel="alternate" hreflang="nl" href="./nl/index.html">
</head>
<body>
  <p>Redirecting… <a href="./en/index.html">Click here if not redirected</a></p>
</body>
</html>
