<head>

  <title>Anneke van Tilburg — Binnenkort beschikbaar</title>
  <meta name="description" content="Anneke van Tilburg — Intuïtief schilderen, ecstatische dans en belichaamd coachen. Binnenkort beschikbaar.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inspiration&family=Source+Sans+3:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:       #F7F3EA;
      --terracotta:  #C05A28;
      --green:       #2C4A1C;
      --gold:        #C4883A;
      --dark:        #1A1009;
      --text-mid:    #5A4A36;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Source Sans 3', sans-serif;
      background-color: var(--cream);
      color: var(--dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
      text-align: center;
    }

    /* Subtle background texture via radial gradients */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(192, 90, 40, 0.07) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 70%, rgba(44, 74, 28, 0.07) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    .inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Thin gold line above name */
    .rule {
      width: 48px;
      height: 1px;
      background: var(--gold);
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeIn 1s 0.2s forwards;
    }

    h1 {
      font-family: 'Inspiration', cursive;
      font-size: clamp(3.2rem, 10vw, 7rem);
      font-weight: 400;
      line-height: 1;
      color: var(--dark);
      opacity: 0;
      animation: fadeUp 1.1s 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .tagline {
      margin-top: 28px;
      font-size: clamp(0.85rem, 2vw, 1rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-mid);
      opacity: 0;
      animation: fadeIn 1s 0.7s forwards;
    }

    .tagline span {
      color: var(--gold);
      margin: 0 12px;
      font-weight: 400;
    }

    /* Social links */
    .social {
      display: flex;
      gap: 20px;
      margin-top: 48px;
      opacity: 0;
      animation: fadeIn 1s 1s forwards;
    }

    .social a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border: 1px solid rgba(90, 74, 54, 0.3);
      border-radius: 50%;
      color: var(--text-mid);
      transition: border-color 0.3s ease, color 0.3s ease, transform 0.3s ease;
      text-decoration: none;
    }

    .social a:hover {
      border-color: var(--terracotta);
      color: var(--terracotta);
      transform: translateY(-3px);
    }

    .social svg {
      width: 17px;
      height: 17px;
      fill: currentColor;
    }

    /* Bottom email */
    .email {
      margin-top: 36px;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      color: var(--text-mid);
      opacity: 0;
      animation: fadeIn 1s 1.2s forwards;
    }

    .email a {
      color: var(--terracotta);
      text-decoration: none;
      border-bottom: 1px solid rgba(192, 90, 40, 0.3);
      padding-bottom: 1px;
      transition: border-color 0.3s;
    }

    .email a:hover {
      border-color: var(--terracotta);
    }

    /* Keyframes */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>

    <h1>Anneke van Tilburg</h1>
