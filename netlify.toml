# Netlify configuration for Anneke van Tilburg website

[build]
  publish = "."

# Redirect root to English version (Netlify-level)
[[redirects]]
  from = "/"
  to = "/en/index.html"
  status = 302
  force = false

# Clean URLs — optional: serve /en/about as /about (uncomment if desired)
# [[redirects]]
#   from = "/painting"
#   to = "/en/painting.html"
#   status = 302

# Cache static assets
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
